definitions:
  lib.AppErr:
    properties:
      message:
        example: some error
        type: string
      status:
        example: 404
        type: integer
    type: object
  lib.ValidationError:
    properties:
      errors:
        items:
          $ref: '#/definitions/lib.validationErrorItem'
        type: array
      status:
        example: 400
        type: integer
    type: object
  lib.validationErrorItem:
    properties:
      key:
        example: email
        type: string
      message:
        example: email is invalid
        type: string
    type: object
  model.AddRoleToUserDto:
    properties:
      title:
        example: ADMIN
        minLength: 3
        type: string
      user_id:
        example: 1
        minimum: 1
        type: integer
    required:
    - title
    - user_id
    type: object
  model.CreateRoleDto:
    properties:
      title:
        example: ADMIN
        maxLength: 55
        minLength: 6
        type: string
    required:
    - title
    type: object
  model.CreateUserDto:
    properties:
      email:
        example: makc@mail.ru
        type: string
      password:
        example: sdfsdfs222
        maxLength: 100
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  model.LoginDto:
    properties:
      email:
        example: makc@mail.ru
        type: string
      password:
        example: sdfsdfs222
        maxLength: 100
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  model.LoginResponse:
    properties:
      roles:
        items:
          $ref: '#/definitions/model.Role'
        type: array
      tokens:
        $ref: '#/definitions/token.Tokens'
      user_id:
        example: 1
        type: integer
    type: object
  model.RegistrationResponse:
    properties:
      id:
        example: 1
        type: integer
    type: object
  model.Role:
    properties:
      role_id:
        example: 1
        type: integer
      title:
        example: ADMIN
        type: string
    type: object
  model.User:
    properties:
      email:
        example: makc@mail.ru
        type: string
      is_activated:
        example: false
        type: boolean
      password_hash:
        example: sdfsdfs222
        maxLength: 100
        minLength: 6
        type: string
      roles:
        items:
          $ref: '#/definitions/model.Role'
        type: array
      user_id:
        example: 1
        type: integer
    required:
    - email
    - password_hash
    type: object
  token.Tokens:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
info:
  contact: {}
paths:
  /api/role/:
    post:
      consumes:
      - application/json
      description: Create role by body arguments
      parameters:
      - description: create role with body dto
        in: body
        name: dto
        required: true
        schema:
          $ref: '#/definitions/model.CreateRoleDto'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Role'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ValidationError'
        "404":
          description: Not Found
          schema:
            items:
              $ref: '#/definitions/lib.AppErr'
            type: array
        "500":
          description: Internal Server Error
          schema:
            items:
              $ref: '#/definitions/lib.AppErr'
            type: array
      security:
      - BearerToken: []
      summary: Create role
      tags:
      - roles
  /api/role/add-to-user:
    post:
      consumes:
      - application/json
      description: Add role to user by body arguments
      parameters:
      - description: add role to user with body dto
        in: body
        name: dto
        required: true
        schema:
          $ref: '#/definitions/model.AddRoleToUserDto'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ValidationError'
        "404":
          description: Not Found
          schema:
            items:
              $ref: '#/definitions/lib.AppErr'
            type: array
        "500":
          description: Internal Server Error
          schema:
            items:
              $ref: '#/definitions/lib.AppErr'
            type: array
      security:
      - BearerToken: []
      summary: Add role to user
      tags:
      - roles
  /api/role/remove-from-user:
    delete:
      consumes:
      - application/json
      description: Remove role from user by body arguments
      parameters:
      - description: Remove role from user with body dto
        in: body
        name: dto
        required: true
        schema:
          $ref: '#/definitions/model.AddRoleToUserDto'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ValidationError'
        "404":
          description: Not Found
          schema:
            items:
              $ref: '#/definitions/lib.AppErr'
            type: array
        "500":
          description: Internal Server Error
          schema:
            items:
              $ref: '#/definitions/lib.AppErr'
            type: array
      security:
      - BearerToken: []
      summary: Remove role from user
      tags:
      - roles
  /api/user/by-id/:id:
    get:
      consumes:
      - application/json
      description: Get user by id
      parameters:
      - description: id parameter
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ValidationError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/lib.AppErr'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.AppErr'
      summary: Get user by id
      tags:
      - users
  /api/user/lk:
    get:
      consumes:
      - application/json
      description: Get profile info by auth only
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/lib.AppErr'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/lib.AppErr'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.AppErr'
      security:
      - BearerToken: []
      summary: Get profile info
      tags:
      - users
  /api/user/login:
    post:
      consumes:
      - application/json
      description: Login to an account with account data
      parameters:
      - description: login in account
        in: body
        name: dto
        required: true
        schema:
          $ref: '#/definitions/model.LoginDto'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ValidationError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/lib.AppErr'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.AppErr'
      summary: Login
      tags:
      - users
  /api/user/refresh-token:
    get:
      consumes:
      - application/json
      description: Refresh tokens by cookies refresh_token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/lib.AppErr'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/lib.AppErr'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.AppErr'
      summary: Refresh tokens
      tags:
      - users
  /api/user/registration:
    post:
      consumes:
      - application/json
      description: Create user by body arguments
      parameters:
      - description: create user with body dto
        in: body
        name: dto
        required: true
        schema:
          $ref: '#/definitions/model.CreateUserDto'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.RegistrationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/lib.ValidationError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/lib.AppErr'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/lib.AppErr'
      summary: Create user
      tags:
      - users
swagger: "2.0"
